<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OptiCrop Home</title>

<style>
    * {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    /* NAVBAR */
    .navbar {
        background: #111;
        display: flex;
        align-items: center;
        padding: 12px 20px;
    }

    .navbar a {
        color: white;
        text-decoration: none;
        margin-right: 25px;
        font-size: 16px;
        padding: 8px 12px;
        border-radius: 5px;
    }

    .navbar a.active {
        background: #2ecc71;
        color: white;
    }

    .navbar a:hover {
        background: #333;
    }

    /* HEADER TEXT */
    .title-section {
        padding: 20px 30px 5px 30px;
    }

    .title-section h1 {
        font-size: 26px;
        font-weight: bold;
    }

    .title-section p {
        margin-top: 8px;
        color: #444;
        font-size: 14px;
        max-width: 900px;
    }

    /* HERO IMAGE */
    .hero {
        position: relative;
        width: 100%;
        height: 500px;
        margin-top: 10px;
        overflow: hidden;
    }

    .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .hero-text {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 60px;
        color: rgba(255,255,255,0.7);
        letter-spacing: 5px;
    }

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a class="active" href="/">Home</a>
    <a href="{{ url_for('about') }}">About</a>

<a href="{{ url_for('findyourcrop') }}">FindYourCrop</a>
</div>

<!-- TITLE -->
<div class="title-section">
    <h1>Opti Crop Agricultural Optimisation</h1>
    <p>
        The main purpose of the OptiCrop aims to develop an advanced software system that utilizes
        data-driven insights to optimize agricultural production for different crops
    </p>
</div>

<!-- HERO IMAGE -->
<div class="hero">
    <!-- Put your image inside static/images folder -->
    <img src="/static/images/CROP.JPG" alt="crop image">
      <div class="hero-text">
        opti-crop
    </div>
</div>

</body>
</html>
